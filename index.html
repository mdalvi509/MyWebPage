<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milind's Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* Left Frame - Navigation */
    #nav-frame {
      width: 200px;
      min-width: 200px;
      background-color: #2c3e50;
      color: #ecf0f1;
      padding: 20px 0;
      border-right: 3px solid #1a252f;
    }

    #nav-frame h2 {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 20px 15px;
      border-bottom: 1px solid #3d5166;
      color: #bdc3c7;
    }

    #nav-frame ul {
      list-style: none;
      margin-top: 10px;
    }

    #nav-frame ul li a {
      display: block;
      padding: 12px 20px;
      color: #ecf0f1;
      text-decoration: none;
      font-size: 15px;
      transition: background 0.2s;
    }

    #nav-frame ul li a:hover,
    #nav-frame ul li a.active {
      background-color: #3498db;
    }

    /* Divider */
    .divider {
      width: 4px;
      background-color: #1a252f;
      cursor: col-resize;
    }

    /* Right Frame - Main Content */
    #main-frame {
      flex: 1;
      background-color: #f4f6f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    #main-frame h1 {
      font-size: 48px;
      color: #2c3e50;
      margin-bottom: 10px;
    }

    #main-frame p.subtitle {
      color: #7f8c8d;
      margin-bottom: 40px;
      font-size: 16px;
    }

    .message-box {
      background: white;
      border-radius: 10px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .message-box h3 {
      margin-bottom: 16px;
      color: #2c3e50;
      font-size: 18px;
    }

    .message-box input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .message-box textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      resize: vertical;
      height: 120px;
      margin-bottom: 16px;
    }

    .message-box button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    .message-box button:hover {
      background-color: #2980b9;
    }

    #confirmation {
      display: none;
      margin-top: 12px;
      color: #27ae60;
      font-size: 14px;
      text-align: center;
    }

    /* Dark Mode Toggle Button */
    #dark-toggle {
      position: fixed;
      top: 16px;
      right: 20px;
      background-color: #2c3e50;
      color: #ecf0f1;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      z-index: 1000;
      transition: background 0.2s;
    }

    #dark-toggle:hover {
      background-color: #3498db;
    }

    /* Dark Mode Styles */
    body.dark {
      background-color: #121212;
    }

    body.dark #nav-frame {
      background-color: #1e1e2e;
      border-right-color: #0d0d1a;
    }

    body.dark #nav-frame h2 {
      border-bottom-color: #2a2a3e;
      color: #888aaa;
    }

    body.dark .divider {
      background-color: #0d0d1a;
    }

    body.dark #main-frame {
      background-color: #1a1a2e;
    }

    body.dark #main-frame h1 {
      color: #e0e0e0;
    }

    body.dark #main-frame p.subtitle {
      color: #888aaa;
    }

    body.dark .message-box {
      background-color: #252535;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    body.dark .message-box h3 {
      color: #e0e0e0;
    }

    body.dark .message-box input[type="text"],
    body.dark .message-box textarea {
      background-color: #1e1e2e;
      color: #e0e0e0;
      border-color: #3a3a5a;
    }

    body.dark #dark-toggle {
      background-color: #ecf0f1;
      color: #2c3e50;
    }

    body.dark #dark-toggle:hover {
      background-color: #bdc3c7;
    }
  </style>
</head>
<body>

  <!-- Dark Mode Toggle -->
  <button id="dark-toggle" onclick="toggleDark()">Dark Mode</button>

  <!-- Left Frame: Navigation Index -->
  <div id="nav-frame">
    <h2>Index</h2>
    <ul>
      <li><a href="#" class="active">Home</a></li>
    </ul>
  </div>

  <div class="divider"></div>

  <!-- Right Frame: Profile & Message -->
  <div id="main-frame">
    <h1>Milind</h1>
    <p class="subtitle">Welcome to my page</p>

    <div class="message-box">
      <h3>Send Me a Message</h3>
      <input type="text" id="sender-name" placeholder="Your name" />
      <textarea id="message-text" placeholder="Write your message here..."></textarea>
      <button onclick="sendMessage()">Send Message</button>
      <p id="confirmation">Message sent! Thanks for reaching out.</p>
    </div>
  </div>

  <script>
    function toggleDark() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('dark-toggle').textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }

    function sendMessage() {
      const name = document.getElementById('sender-name').value.trim();
      const message = document.getElementById('message-text').value.trim();
      if (!name || !message) {
        alert('Please fill in both your name and a message.');
        return;
      }
      document.getElementById('sender-name').value = '';
      document.getElementById('message-text').value = '';
      document.getElementById('confirmation').style.display = 'block';
      setTimeout(() => {
        document.getElementById('confirmation').style.display = 'none';
      }, 4000);
    }
  </script>

</body>
</html>
